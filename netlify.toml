[build]
  command = "npm run docs:build"
  publish = "docs/.vitepress/dist"

[build.environment]
  NODE_VERSION = "22"

# Vite-hashed assets are content-addressed; cache forever.
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# keywords.json is regenerated on each ETL run; allow 1-hour cache with stale fallback.
[[headers]]
  for = "/data/keywords.json"
  [headers.values]
    Cache-Control = "public, max-age=3600, stale-while-revalidate=86400"
